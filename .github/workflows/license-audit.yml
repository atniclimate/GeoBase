# license-audit — C3 release hardening. Fails if any transitive cargo
# dependency carries a strong-copyleft (GPL/AGPL) license with no permissive
# alternative in its SPDX expression, which would be incompatible with the
# Apache-2.0 distributed binary. Weak file-level copyleft (MPL-2.0, LGPL with a
# permissive OR-branch) is allowed and reported.
#
# Enters INFORMATIONAL (not a required check) per the house five-greens rule;
# folds into blocking CI once stable. The generated inventory
# (THIRD_PARTY_LICENSES.md) is uploaded as an artifact.
name: License Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: license-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Dependency license audit (cargo + pnpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (so pnpm can list licenses)
        run: pnpm install --frozen-lockfile
      - name: Audit licenses (fails on disallowed strong copyleft)
        run: python scripts/license_audit.py --check --write THIRD_PARTY_LICENSES.md
      - name: Upload generated inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: third-party-licenses
          path: THIRD_PARTY_LICENSES.md
