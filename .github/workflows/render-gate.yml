# Phase 0.2 render gate — terrain-displacement proof in CI.
#
# Deliberately a SEPARATE workflow from ci.yml: headless-WebGL rendering on
# shared runners (SwiftShader, via Playwright's default --enable-unsafe-
# swiftshader) can flake, and a flaky job inside the main CI workflow would
# redden pushes for environment noise — the exact Phase 0.1 failure mode.
# This job is INFORMATIONAL until it records 5 consecutive green runs on
# main; then fold it into ci.yml as blocking. The authoritative gate remains
# the local harness run (engine-light `verify:render`) plus the committed,
# human-endorsed screenshot in docs/verification/.
name: Render Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: render-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render-gate:
    name: Terrain displacement proof (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Install Chromium (workspace-pinned Playwright)
        run: pnpm --filter @geobase/engine-light exec playwright install --with-deps chromium
      - name: Build Light Engine
        run: pnpm --filter @geobase/engine-light build
      - name: Run render gate
        run: pnpm --filter @geobase/engine-light run verify:render
      - name: Upload captures (evidence survives failures)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-gate-output
          path: engine-light/verify-out/

  node-render-gate:
    name: Terrain displacement proof (served by the grounded node — Phase 1.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Install Chromium (workspace-pinned Playwright)
        run: pnpm --filter @geobase/engine-light exec playwright install --with-deps chromium
      - name: Build Light Engine
        run: pnpm --filter @geobase/engine-light build
      - name: Build node example
        run: cargo build --locked -p geobase-engine-desktop --example node
      - name: Boot grounded node and run the gate through it
        run: |
          mkdir -p /tmp/vault
          ./target/debug/examples/node place.example.toml /tmp/vault \
            engine-light/public/tiles/terrain 8765 &
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8765/api/node >/dev/null && break
            sleep 1
          done
          curl -sf http://127.0.0.1:8765/api/node
          NODE_URL=http://127.0.0.1:8765 pnpm --filter @geobase/engine-light run verify:render
      - name: Upload captures (evidence survives failures)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-render-gate-output
          path: engine-light/verify-out/

  layer-gate:
    name: Layer packages toggle + stack proof (Phase 1.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Install Chromium (workspace-pinned Playwright)
        run: pnpm --filter @geobase/engine-light exec playwright install --with-deps chromium
      - name: Build Light Engine
        run: pnpm --filter @geobase/engine-light build
      - name: Build geopack CLI and node example
        run: |
          cargo build --locked -p geobase-ingestor --bin geopack
          cargo build --locked -p geobase-engine-desktop --example node
      - name: Package the two committed fixture layer packages
        run: |
          mkdir -p /tmp/layer-vault
          ./target/debug/geopack package \
            --manifest data/fixtures/geopack/landcover_pkg.toml \
            --out /tmp/layer-vault/landcover-2026.gpkg --actor layer-gate-ci
          ./target/debug/geopack package \
            --manifest data/fixtures/geopack/flood_pkg.toml \
            --out /tmp/layer-vault/flood-2026.gpkg --actor layer-gate-ci
      - name: Boot grounded node and run the layer gate through it
        run: |
          ./target/debug/examples/node place.example.toml /tmp/layer-vault \
            engine-light/public/tiles/terrain 8766 &
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8766/api/node >/dev/null && break
            sleep 1
          done
          curl -sf http://127.0.0.1:8766/api/packs
          NODE_URL=http://127.0.0.1:8766 pnpm --filter @geobase/engine-light run verify:layers
      - name: Upload captures (evidence survives failures)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: layer-gate-output
          path: engine-light/verify-out/layers/
