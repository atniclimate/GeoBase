name: Deploy Light Engine to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build Light Engine
        run: pnpm --filter @geobase/engine-light build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: engine-light/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      # The Pages backend intermittently fails the status poll with an
      # upstream "Deployment failed, try again later" even though the build
      # and artifact are fine (observed here 2026-07-03, twice; same
      # transient documented in the DDM). Encode the proven manual remedy
      # (`gh run rerun --failed`) as one in-workflow retry after a short
      # settle, with no third-party retry action. Pattern borrowed from the
      # DDM bridge catalog (docs/interop/DDM-BRIDGE.md).
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retrying the transient Pages failure
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (retry after transient failure)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
